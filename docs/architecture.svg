<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <title>AccessGuard AI Architecture</title>
  <desc>Slack surfaces connect to a Bolt agent (intent parser, autonomous LLM tool-calling loop, AI reasoner, Block Kit UI), which acts as an MCP client to five MCP servers (HR, IAM, Audit, Ticket, Policy with the deterministic risk engine), all backed by SQLite.</desc>
  <style>
    .bg{fill:#12151f}
    .panel{fill:#1c2030;stroke:#39405a;stroke-width:1.5;rx:12}
    .sub{fill:#262b3d;stroke:#3f4660;stroke-width:1}
    .sub2{fill:#2b3550;stroke:#e23b2e;stroke-width:1.4}
    .title{fill:#f2f4fa;font-size:15px;font-weight:700}
    .h{fill:#f2f4fa;font-size:13.5px;font-weight:600}
    .lbl{fill:#e8eaf0;font-size:13px;font-weight:600}
    .mut{fill:#9aa3b8;font-size:11px}
    .tag{fill:#aeb6cc;font-size:10.5px;font-weight:600;letter-spacing:1px}
    .red{fill:#e23b2e}
    .redt{fill:#ff6a5e;font-size:10.5px;font-weight:600}
    .tealt{fill:#5eead4;font-size:10.5px;font-weight:600}
    .flow{stroke:#5a628a;stroke-width:2;fill:none}
    .arrow{stroke:#6b7396;stroke-width:2;fill:none;marker-end:url(#a)}
    .dash{stroke:#e23b2e;stroke-width:1.6;fill:none;stroke-dasharray:5 4;marker-end:url(#ar)}
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6b7396"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e23b2e"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1000" height="700"/>

  <!-- brand -->
  <rect x="34" y="26" width="20" height="20" rx="4" fill="#e23b2e" transform="rotate(45 44 36)"/>
  <text x="70" y="34" class="title">AccessGuard AI</text>
  <text x="70" y="50" class="mut">AI Identity &amp; Access Management Agent · Model Context Protocol</text>

  <!-- Tier 1: Slack -->
  <rect class="panel" x="60" y="72" width="880" height="72" rx="12"/>
  <text x="78" y="92" class="tag">SLACK · SOCKET MODE</text>
  <g>
    <rect class="sub" x="90" y="100" width="150" height="32" rx="8"/><text x="165" y="120" text-anchor="middle" class="lbl">Assistant</text>
    <rect class="sub" x="258" y="100" width="150" height="32" rx="8"/><text x="333" y="120" text-anchor="middle" class="lbl">Home Tab</text>
    <rect class="sub" x="426" y="100" width="150" height="32" rx="8"/><text x="501" y="120" text-anchor="middle" class="lbl">@ Mentions</text>
    <rect class="sub" x="594" y="100" width="150" height="32" rx="8"/><text x="669" y="120" text-anchor="middle" class="lbl">Slash Cmds</text>
    <rect class="sub" x="762" y="100" width="150" height="32" rx="8"/><text x="837" y="120" text-anchor="middle" class="lbl">Buttons</text>
  </g>

  <path class="arrow" d="M500,144 L500,182"/>

  <!-- Tier 2: Agent -->
  <rect class="panel" x="140" y="184" width="560" height="120" rx="12"/>
  <text x="160" y="206" class="tag">ACCESSGUARD AGENT · SLACK BOLT</text>
  <g>
    <rect class="sub" x="158" y="220" width="124" height="66" rx="9"/>
    <text x="220" y="248" text-anchor="middle" class="h">Intent</text><text x="220" y="266" text-anchor="middle" class="mut">parser</text>
    <rect class="sub2" x="289" y="220" width="124" height="66" rx="9"/>
    <text x="351" y="248" text-anchor="middle" class="h">Agent Loop</text><text x="351" y="266" text-anchor="middle" class="redt">LLM tool-calling</text>
    <rect class="sub" x="420" y="220" width="124" height="66" rx="9"/>
    <text x="482" y="248" text-anchor="middle" class="h">AI Reasoner</text><text x="482" y="266" text-anchor="middle" class="mut">narrative</text>
    <rect class="sub" x="551" y="220" width="124" height="66" rx="9"/>
    <text x="613" y="248" text-anchor="middle" class="h">Block Kit</text><text x="613" y="266" text-anchor="middle" class="mut">UI</text>
  </g>

  <!-- LLM engine -->
  <rect class="panel" x="742" y="200" width="200" height="80" rx="12"/>
  <text x="842" y="232" text-anchor="middle" class="h">LLM Engine</text>
  <text x="842" y="252" text-anchor="middle" class="mut">OpenRouter / OpenAI</text>
  <text x="842" y="268" text-anchor="middle" class="mut">gpt-4o-mini</text>
  <path class="dash" d="M742,240 L676,244"/>
  <text x="712" y="196" text-anchor="middle" class="redt">selects tools</text>

  <path class="arrow" d="M420,304 L420,340"/>
  <text x="432" y="326" class="mut">MCP · stdio · JSON-RPC</text>

  <!-- Tier 3: MCP client -->
  <rect class="panel" x="270" y="340" width="300" height="48" rx="12"/>
  <text x="420" y="362" text-anchor="middle" class="h">MCP Client Manager</text>
  <text x="420" y="378" text-anchor="middle" class="mut">spawns + connects 5 servers</text>

  <!-- bus -->
  <path class="flow" d="M420,388 L420,404 L150,404 L150,432 M420,404 L325,404 L325,432 M420,404 L500,404 L500,432 M420,404 L675,404 L675,432 M420,404 L850,404 L850,432" stroke="#5a628a"/>

  <!-- Tier 4: MCP servers -->
  <g>
    <rect class="panel" x="75" y="432" width="150" height="86" rx="11"/>
    <text x="150" y="462" text-anchor="middle" class="h">HR</text><text x="150" y="482" text-anchor="middle" class="tealt">identity</text><text x="150" y="502" text-anchor="middle" class="mut">4 tools</text>
    <rect class="panel" x="250" y="432" width="150" height="86" rx="11"/>
    <text x="325" y="462" text-anchor="middle" class="h">IAM</text><text x="325" y="482" text-anchor="middle" class="tealt">grant / revoke</text><text x="325" y="502" text-anchor="middle" class="mut">8 tools</text>
    <rect class="panel" x="425" y="432" width="150" height="86" rx="11"/>
    <text x="500" y="462" text-anchor="middle" class="h">Audit</text><text x="500" y="482" text-anchor="middle" class="tealt">logins / geo</text><text x="500" y="502" text-anchor="middle" class="mut">5 tools</text>
    <rect class="panel" x="600" y="432" width="150" height="86" rx="11"/>
    <text x="675" y="462" text-anchor="middle" class="h">Ticket</text><text x="675" y="482" text-anchor="middle" class="tealt">approvals</text><text x="675" y="502" text-anchor="middle" class="mut">3 tools</text>
    <rect x="775" y="432" width="150" height="86" rx="11" fill="#241a1e" stroke="#e23b2e" stroke-width="1.6"/>
    <text x="850" y="462" text-anchor="middle" class="h">Policy</text><text x="850" y="482" text-anchor="middle" class="redt">Risk Engine</text><text x="850" y="502" text-anchor="middle" class="mut">deterministic</text>
  </g>

  <!-- to SQLite -->
  <path class="flow" d="M150,518 L150,548 L500,548 M325,518 L325,548 M500,518 L500,564 M675,518 L675,548 M850,518 L850,548 L500,548" stroke="#5a628a"/>

  <!-- Tier 5: SQLite -->
  <rect class="panel" x="300" y="564" width="400" height="50" rx="12"/>
  <text x="500" y="586" text-anchor="middle" class="h">SQLite · node:sqlite</text>
  <text x="500" y="603" text-anchor="middle" class="mut">~30-employee enterprise dataset (users, perms, audit, tickets, policies)</text>

  <!-- legend -->
  <text x="60" y="648" class="mut"><tspan class="redt">■</tspan>  Risk score is computed deterministically by the Policy server — the LLM writes the narrative and chooses tools, but never invents the score.</text>
  <text x="60" y="668" class="mut"><tspan class="tealt">■</tspan>  Five independent MCP servers · <tspan class="redt">■</tspan> deterministic risk engine · agent is a pure MCP client.</text>
</svg>
